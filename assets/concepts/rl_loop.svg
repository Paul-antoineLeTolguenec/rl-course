<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 500 220">
  <defs>
    <marker id="arr" markerWidth="8" markerHeight="8" refX="6" refY="3" orient="auto">
      <path d="M0,0 L0,6 L8,3 z" fill="#00d4ff"/>
    </marker>
  </defs>

  <!-- Agent -->
  <rect x="30" y="80" width="120" height="60" rx="10"
        fill="rgba(13,18,32,0.9)" stroke="rgba(0,212,255,0.3)" stroke-width="1.5"/>
  <text x="90" y="104" text-anchor="middle"
        font-family="sans-serif" font-size="20">🤖</text>
  <text x="90" y="124" text-anchor="middle"
        font-family="sans-serif" font-size="12" fill="#e2e8f0">Agent</text>

  <!-- Environment -->
  <rect x="350" y="80" width="120" height="60" rx="10"
        fill="rgba(13,18,32,0.9)" stroke="rgba(0,212,255,0.3)" stroke-width="1.5"/>
  <text x="410" y="104" text-anchor="middle"
        font-family="sans-serif" font-size="20">🌍</text>
  <text x="410" y="124" text-anchor="middle"
        font-family="sans-serif" font-size="12" fill="#e2e8f0">Environment</text>

  <!-- Top arrow: Agent → Environment -->
  <path d="M150,93 Q250,38 350,93"
        fill="none" stroke="#00d4ff" stroke-width="1.5" marker-end="url(#arr)"/>
  <!-- action label -->
  <text x="250" y="44" text-anchor="middle"
        font-family="sans-serif" font-size="12" fill="#00d4ff">action  a<tspan baseline-shift="sub" font-size="9">t</tspan></text>

  <!-- Bottom arrow: Environment → Agent -->
  <path d="M350,127 Q250,182 150,127"
        fill="none" stroke="#00d4ff" stroke-width="1.5" marker-end="url(#arr)"/>
  <!-- state label -->
  <text x="250" y="168" text-anchor="middle"
        font-family="sans-serif" font-size="12" fill="#00d4ff">state  s<tspan baseline-shift="sub" font-size="9">t+1</tspan></text>
  <!-- reward label -->
  <text x="250" y="186" text-anchor="middle"
        font-family="sans-serif" font-size="12" fill="#a78bfa">reward  r<tspan baseline-shift="sub" font-size="9">t+1</tspan></text>

</svg>
