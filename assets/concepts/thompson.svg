<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 340 170">

  <!-- x-axis -->
  <line x1="30" y1="140" x2="310" y2="140" stroke="rgba(226,232,240,0.15)" stroke-width="1"/>
  <text x="30" y="152" text-anchor="middle" font-family="sans-serif" font-size="8" fill="#7a8fa6">0</text>
  <text x="310" y="152" text-anchor="middle" font-family="sans-serif" font-size="8" fill="#7a8fa6">1</text>
  <text x="170" y="163" text-anchor="middle" font-family="sans-serif" font-size="8" fill="#7a8fa6" font-style="italic">reward</text>

  <!-- === Arm 1 (purple) — posterior peaked at ~0.30, narrow === -->
  <path d="M 50,140 C 65,140 75,52 95,52 C 115,52 125,140 140,140"
        fill="rgba(167,139,250,0.12)" stroke="#a78bfa" stroke-width="1.5"/>
  <!-- sample at x=100 -->
  <line x1="100" y1="140" x2="100" y2="90" stroke="#a78bfa" stroke-width="1" stroke-dasharray="3,2"/>
  <circle cx="100" cy="140" r="4" fill="#a78bfa"/>
  <text x="95" y="40" text-anchor="middle" font-family="sans-serif" font-size="9" fill="#a78bfa">arm 1</text>

  <!-- === Arm 2 (blue) — posterior peaked at ~0.50, medium width === -->
  <path d="M 135,140 C 150,140 162,68 178,68 C 194,68 206,140 221,140"
        fill="rgba(96,165,250,0.12)" stroke="#60a5fa" stroke-width="1.5"/>
  <!-- sample at x=168 -->
  <line x1="168" y1="140" x2="168" y2="98" stroke="#60a5fa" stroke-width="1" stroke-dasharray="3,2"/>
  <circle cx="168" cy="140" r="4" fill="#60a5fa"/>
  <text x="178" y="56" text-anchor="middle" font-family="sans-serif" font-size="9" fill="#60a5fa">arm 2</text>

  <!-- === Arm 3 (cyan) — posterior peaked at ~0.65, wider (less explored) → sample highest === -->
  <path d="M 210,140 C 225,140 242,46 262,46 C 282,46 296,140 310,140"
        fill="rgba(0,212,255,0.12)" stroke="#00d4ff" stroke-width="1.5"/>
  <!-- sample at x=278 — rightmost, selected -->
  <line x1="278" y1="140" x2="278" y2="78" stroke="#00d4ff" stroke-width="1.5" stroke-dasharray="3,2"/>
  <!-- glow ring -->
  <circle cx="278" cy="140" r="8" fill="rgba(0,212,255,0.15)"/>
  <circle cx="278" cy="140" r="5" fill="#00d4ff"/>
  <!-- star -->
  <text x="289" y="70" font-family="sans-serif" font-size="11" fill="#00d4ff">&#9733;</text>
  <text x="262" y="34" text-anchor="middle" font-family="sans-serif" font-size="9" fill="#00d4ff">arm 3</text>

  <!-- "sample" label bottom left -->
  <text x="32" y="130" font-family="sans-serif" font-size="8" fill="#7a8fa6" font-style="italic">sample</text>
</svg>
