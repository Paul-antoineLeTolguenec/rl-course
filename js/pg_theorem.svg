<svg xmlns="http://www.w3.org/2000/svg" width="600" height="168" viewBox="0 0 600 168">
  <style>
    .lbl  { font-family: Inter, system-ui, sans-serif; font-size: 12px; text-anchor: middle; dominant-baseline: middle; }
    .mono { font-family: 'JetBrains Mono', monospace; font-size: 8px; }
    .mb   { font-family: 'JetBrains Mono', monospace; font-size: 8.5px; font-weight: 700; }

    @keyframes bar1 { 0%,15%{ width:72px; } 52%,80%{ width:182px; } 95%,100%{ width:72px; } }
    @keyframes bar2 { 0%,15%{ width:72px; } 52%,80%{ width: 90px; } 95%,100%{ width:72px; } }
    @keyframes bar3 { 0%,15%{ width:72px; } 52%,80%{ width: 14px; } 95%,100%{ width:72px; } }
    @keyframes sig  { 0%,35%{ opacity:0; } 50%,78%{ opacity:1; } 90%,100%{ opacity:0; } }

    .b1 { animation: bar1 9s ease-in-out infinite; }
    .b2 { animation: bar2 9s ease-in-out infinite; }
    .b3 { animation: bar3 9s ease-in-out infinite; }
    .sg { animation: sig  9s ease-in-out infinite; opacity:0; }
  </style>

  <defs>
    <marker id="mc" markerWidth="6" markerHeight="6" refX="5" refY="3" orient="auto">
      <polygon points="0 0,6 3,0 6" fill="rgba(0,212,255,0.5)"/>
    </marker>
    <marker id="mw" markerWidth="6" markerHeight="6" refX="5" refY="3" orient="auto">
      <polygon points="0 0,6 3,0 6" fill="rgba(255,255,255,0.25)"/>
    </marker>
    <marker id="mp" markerWidth="6" markerHeight="6" refX="5" refY="3" orient="auto">
      <polygon points="0 0,6 3,0 6" fill="rgba(167,139,250,0.45)"/>
    </marker>
  </defs>

  <!-- State node -->
  <circle cx="50" cy="84" r="24" fill="rgba(13,18,32,0.88)" stroke="#00d4ff" stroke-width="1.5"/>
  <text class="lbl" x="50" y="84" fill="#00d4ff">s</text>

  <!-- Action arrows (tip at bar row centers: y=34, 84, 134) -->
  <line x1="72" y1="70" x2="257" y2="34"  stroke="rgba(0,212,255,0.45)"   stroke-width="1.4" marker-end="url(#mc)"/>
  <line x1="74" y1="84" x2="257" y2="84"  stroke="rgba(255,255,255,0.2)"  stroke-width="1.4" marker-end="url(#mw)"/>
  <line x1="72" y1="98" x2="257" y2="134" stroke="rgba(167,139,250,0.38)" stroke-width="1.4" marker-end="url(#mp)"/>

  <!-- Row labels: action + Q, above each bar -->
  <text class="mb" x="264" y="21"  fill="#00d4ff"                text-anchor="start">a&#x2081;   Q = +2.1</text>
  <text class="mb" x="264" y="71"  fill="rgba(255,255,255,0.5)"  text-anchor="start">a&#x2082;   Q = +0.4</text>
  <text class="mb" x="264" y="118" fill="rgba(167,139,250,0.65)" text-anchor="start">a&#x2083;   Q = &#x2212;1.2</text>

  <!-- Bar background tracks -->
  <rect x="262" y="24"  width="220" height="20" rx="3" fill="rgba(255,255,255,0.03)" stroke="rgba(255,255,255,0.07)" stroke-width="0.5"/>
  <rect x="262" y="74"  width="220" height="20" rx="3" fill="rgba(255,255,255,0.03)" stroke="rgba(255,255,255,0.07)" stroke-width="0.5"/>
  <rect x="262" y="124" width="220" height="20" rx="3" fill="rgba(255,255,255,0.03)" stroke="rgba(255,255,255,0.07)" stroke-width="0.5"/>

  <!-- Animated bars -->
  <rect class="b1" x="262" y="24"  height="20" rx="3" fill="rgba(0,212,255,0.45)"/>
  <text class="mb" x="268" y="38"  fill="rgba(0,212,255,0.9)"  text-anchor="start">&#x3C0;&#x3B8;(a&#x2081;|s)</text>
  <rect class="b2" x="262" y="74"  height="20" rx="3" fill="rgba(255,255,255,0.2)"/>
  <text class="mb" x="268" y="88"  fill="rgba(255,255,255,0.7)" text-anchor="start">&#x3C0;&#x3B8;(a&#x2082;|s)</text>
  <rect class="b3" x="262" y="124" height="20" rx="3" fill="rgba(167,139,250,0.38)"/>
  <text class="mb" x="268" y="138" fill="rgba(167,139,250,0.9)" text-anchor="start">&#x3C0;&#x3B8;(a&#x2083;|s)</text>

  <!-- Gradient direction signals (appear mid-animation) -->
  <text class="sg mb" x="492" y="36"  fill="#00d4ff"                text-anchor="start">&#x2191;&#x2191;</text>
  <text class="sg mb" x="492" y="86"  fill="rgba(255,255,255,0.5)"  text-anchor="start">&#x2191;</text>
  <text class="sg mb" x="492" y="136" fill="rgba(167,139,250,0.7)"  text-anchor="start">&#x2193;</text>
</svg>
