<svg xmlns="http://www.w3.org/2000/svg" width="560" height="148" viewBox="0 0 560 148">
  <style>
    .lbl { font-family: 'JetBrains Mono', monospace; font-size: 7.5px; }
    .tag { font-family: 'JetBrains Mono', monospace; font-size: 6px; font-weight: 700; letter-spacing: 0.10em; text-transform: uppercase; }

    @keyframes rp { 0%,100%{opacity:0} 8%{opacity:1} 44%{opacity:1} 52%{opacity:0} }
    @keyframes tn { 0%,52%{opacity:0} 60%{opacity:1} 92%{opacity:1} 100%{opacity:0} }

    .ph-rp { animation: rp 9s ease-in-out infinite; opacity:0; }
    .ph-tn { animation: tn 9s ease-in-out infinite; opacity:0; }
  </style>

  <!-- Background -->
  <rect x="4" y="4" width="552" height="140" rx="6"
        fill="rgba(255,255,255,0.02)" stroke="rgba(255,255,255,0.06)" stroke-width="0.5"/>

  <!-- Vertical divider -->
  <line x1="278" y1="12" x2="278" y2="136"
        stroke="rgba(255,255,255,0.08)" stroke-width="0.7" stroke-dasharray="3,4"/>

  <!-- Panel tags (always visible) -->
  <text class="tag" x="134" y="16" fill="rgba(0,212,255,0.35)"   text-anchor="middle">① experience replay</text>
  <text class="tag" x="418" y="16" fill="rgba(245,158,11,0.45)" text-anchor="middle">② target network</text>

  <!-- ── Buffer (left panel) ── -->
  <rect x="108" y="24" width="52" height="104" rx="4"
        fill="rgba(255,255,255,0.02)" stroke="rgba(255,255,255,0.18)" stroke-width="0.8"/>
  <text class="tag" x="134" y="35" fill="rgba(255,255,255,0.30)" text-anchor="middle">buffer</text>
  <rect x="114" y="40" width="40" height="7" rx="1" fill="rgba(255,255,255,0.05)" stroke="rgba(255,255,255,0.10)" stroke-width="0.5"/>
  <rect x="114" y="51" width="40" height="7" rx="1" fill="rgba(255,255,255,0.05)" stroke="rgba(255,255,255,0.10)" stroke-width="0.5"/>
  <rect x="114" y="62" width="40" height="7" rx="1" fill="rgba(255,255,255,0.05)" stroke="rgba(255,255,255,0.10)" stroke-width="0.5"/>
  <rect x="114" y="73" width="40" height="7" rx="1" fill="rgba(255,255,255,0.04)" stroke="rgba(255,255,255,0.08)" stroke-width="0.5"/>
  <rect x="114" y="84" width="40" height="7" rx="1" fill="rgba(255,255,255,0.04)" stroke="rgba(255,255,255,0.08)" stroke-width="0.5"/>
  <text class="lbl" x="134" y="104" fill="rgba(255,255,255,0.12)" text-anchor="middle">· · ·</text>
  <text class="lbl" x="134" y="121" fill="rgba(255,255,255,0.14)" text-anchor="middle">N transitions</text>

  <!-- ── Q_w online (right panel) ── -->
  <circle cx="358" cy="74" r="22"
          fill="rgba(0,212,255,0.06)" stroke="rgba(0,212,255,0.45)" stroke-width="1"/>
  <text class="lbl" x="358" y="71" fill="rgba(0,212,255,0.72)" text-anchor="middle">Q<tspan dy="2.5" font-size="5.5">w</tspan><tspan dy="-2.5"> </tspan></text>
  <text class="tag" x="358" y="82" fill="rgba(0,212,255,0.35)" text-anchor="middle">online</text>

  <!-- ── Q_w⁻ target (right panel) ── -->
  <circle cx="492" cy="74" r="22"
          fill="rgba(245,158,11,0.04)" stroke="rgba(245,158,11,0.35)" stroke-width="0.8" stroke-dasharray="3,2"/>
  <text class="lbl" x="492" y="71" fill="rgba(245,158,11,0.65)" text-anchor="middle">Q<tspan dy="2.5" font-size="5.5">w⁻</tspan><tspan dy="-2.5"> </tspan></text>
  <text class="tag" x="492" y="82" fill="rgba(245,158,11,0.30)" text-anchor="middle">target</text>

  <!-- ── Phase 1: experience replay ── -->
  <g class="ph-rp">
    <!-- correlated state chain: 3 dots + arrows feeding into buffer -->
    <circle cx="22" cy="62" r="5" fill="rgba(255,255,255,0.10)" stroke="rgba(255,255,255,0.32)" stroke-width="0.8"/>
    <circle cx="48" cy="62" r="5" fill="rgba(255,255,255,0.10)" stroke="rgba(255,255,255,0.32)" stroke-width="0.8"/>
    <circle cx="74" cy="62" r="5" fill="rgba(255,255,255,0.10)" stroke="rgba(255,255,255,0.32)" stroke-width="0.8"/>
    <line x1="27" y1="62" x2="41" y2="62" stroke="rgba(255,255,255,0.38)" stroke-width="0.8"/>
    <polygon points="43,62 38,59.5 38,64.5" fill="rgba(255,255,255,0.38)"/>
    <line x1="53" y1="62" x2="67" y2="62" stroke="rgba(255,255,255,0.38)" stroke-width="0.8"/>
    <polygon points="69,62 64,59.5 64,64.5" fill="rgba(255,255,255,0.38)"/>
    <!-- chain → buffer -->
    <line x1="79" y1="62" x2="106" y2="62" stroke="rgba(255,255,255,0.55)" stroke-width="1.2"/>
    <polygon points="108,62 102,58.5 102,65.5" fill="rgba(255,255,255,0.55)"/>
    <text class="lbl" x="62" y="48" fill="rgba(255,255,255,0.55)" text-anchor="middle">Sₜ → Sₜ₊₁ → ···</text>
    <text class="tag" x="62" y="79" fill="rgba(239,68,68,0.55)" text-anchor="middle">correlated</text>

    <!-- random sampling: 2 highlighted rows + arrow out -->
    <rect x="114" y="51" width="40" height="7" rx="1" fill="rgba(0,212,255,0.22)" stroke="rgba(0,212,255,0.55)" stroke-width="0.8"/>
    <rect x="114" y="73" width="40" height="7" rx="1" fill="rgba(0,212,255,0.16)" stroke="rgba(0,212,255,0.38)" stroke-width="0.8"/>
    <line x1="160" y1="90" x2="248" y2="90" stroke="rgba(0,212,255,0.65)" stroke-width="1.2"/>
    <polygon points="250,90 244,86.5 244,93.5" fill="rgba(0,212,255,0.65)"/>
    <text class="lbl" x="204" y="104" fill="rgba(0,212,255,0.60)" text-anchor="middle">i.i.d. mini-batch</text>

    <!-- glow buffer -->
    <rect x="108" y="24" width="52" height="104" rx="4"
          fill="none" stroke="rgba(0,212,255,0.40)" stroke-width="1.5"/>
  </g>

  <!-- ── Phase 2: target network ── -->
  <g class="ph-tn">
    <!-- target arrow Q_w⁻ → Q_w (horizontal) -->
    <!-- Q_w⁻ left edge: 492−22=470 · Q_w right edge: 358+22=380 -->
    <line x1="470" y1="74" x2="382" y2="74"
          stroke="rgba(245,158,11,0.75)" stroke-width="1.5"/>
    <polygon points="380,74 387,70 387,78" fill="rgba(245,158,11,0.75)"/>
    <text class="lbl" x="426" y="59" fill="rgba(245,158,11,0.72)" text-anchor="middle">y = Rₜ + γ max Q<tspan dy="2.5" font-size="5.5">w⁻</tspan><tspan dy="-2.5">(Sₜ₊₁)</tspan></text>

    <!-- gradient update label on Q_w -->
    <text class="lbl" x="358" y="46" fill="rgba(0,212,255,0.62)" text-anchor="middle">w ← w − α∇ℒ</text>

    <!-- "frozen" label under Q_w⁻ -->
    <text class="tag" x="492" y="106" fill="rgba(245,158,11,0.45)" text-anchor="middle">frozen C steps</text>

    <!-- sync arrow Q_w → Q_w⁻ (dashed, below circles) -->
    <!-- Q_w bottom: cy=96 · Q_w⁻ bottom: cy=96 — line at y=99 -->
    <line x1="358" y1="99" x2="488" y2="99"
          stroke="rgba(255,255,255,0.55)" stroke-width="1.2" stroke-dasharray="4,3"/>
    <polygon points="490,99 483,95.5 483,102.5" fill="rgba(255,255,255,0.55)"/>
    <text class="lbl" x="424" y="114" fill="rgba(255,255,255,0.42)" text-anchor="middle">w⁻ ← w   every C steps</text>

    <!-- glow circles -->
    <circle cx="492" cy="74" r="22"
            fill="rgba(245,158,11,0.10)" stroke="rgba(245,158,11,0.65)" stroke-width="1.5"/>
    <circle cx="358" cy="74" r="22"
            fill="rgba(0,212,255,0.10)" stroke="rgba(0,212,255,0.70)" stroke-width="1.5"/>
  </g>

</svg>
