<svg xmlns="http://www.w3.org/2000/svg" width="560" height="168" viewBox="0 0 560 168">
  <style>
    .lbl { font-family: 'JetBrains Mono', monospace; font-size: 7.5px; }
    .tag { font-family: 'JetBrains Mono', monospace; font-size: 6.5px; font-weight: 700; letter-spacing: 0.12em; text-transform: uppercase; }
    .sig { font-family: Inter, sans-serif; font-size: 34px; font-weight: 900; dominant-baseline: middle; text-anchor: middle; }

    @keyframes showPos { 0%,100%{opacity:0} 5%{opacity:1} 44%{opacity:1} 50%{opacity:0} }
    @keyframes showNeg { 0%,52%{opacity:0} 57%{opacity:1} 93%{opacity:1} 98%{opacity:0} 100%{opacity:0} }

    .pos { animation: showPos 10s ease-in-out infinite; opacity: 0; }
    .neg { animation: showNeg 10s ease-in-out infinite; opacity: 0; }
  </style>

  <!-- Background -->
  <rect x="4" y="4" width="552" height="160" rx="6"
        fill="rgba(255,255,255,0.02)" stroke="rgba(255,255,255,0.06)" stroke-width="0.5"/>

  <!-- Panel divider -->
  <line x1="350" y1="14" x2="350" y2="154"
        stroke="rgba(255,255,255,0.06)" stroke-width="0.5" stroke-dasharray="3,4"/>

  <!-- X-axis -->
  <line x1="50" y1="128" x2="305" y2="128" stroke="rgba(255,255,255,0.15)" stroke-width="0.8"/>

  <!-- Column headers -->
  <text class="tag" x="100" y="20" fill="rgba(245,158,11,0.60)" text-anchor="middle">Expected</text>
  <text class="tag" x="220" y="20" fill="rgba(255,255,255,0.35)" text-anchor="middle">Observed</text>
  <text class="tag" x="452" y="20" fill="rgba(255,255,255,0.22)" text-anchor="middle">Actor update</text>

  <!-- ── BAR 1: V_w(S_t) = 3.0 — amber, always visible ── -->
  <!-- scale: 20px/unit, baseline y=128, top=y=68, h=60 -->
  <rect x="70" y="68" width="60" height="60" rx="3"
        fill="rgba(245,158,11,0.16)" stroke="rgba(245,158,11,0.52)" stroke-width="1"/>
  <text class="lbl" x="100" y="62" fill="rgba(245,158,11,0.75)" text-anchor="middle">3.0</text>
  <text class="lbl" x="100" y="141" fill="rgba(245,158,11,0.62)" text-anchor="middle">V<tspan dy="2.5" font-size="5.5">w</tspan><tspan dy="-2.5">(Sₜ)</tspan></text>

  <!-- Reference dashed line at y=68 (expected level) -->
  <line x1="70" y1="68" x2="300" y2="68"
        stroke="rgba(245,158,11,0.25)" stroke-width="0.8" stroke-dasharray="4,3"/>

  <!-- ── BAR 2 POSITIVE: r+γV = 4.5 → h=90, top=y=38, δ=+1.5 ── -->
  <rect class="pos" x="190" y="38" width="60" height="90" rx="3"
        fill="rgba(34,197,94,0.18)" stroke="rgba(34,197,94,0.55)" stroke-width="1"/>
  <text class="pos lbl" x="220" y="32" fill="rgba(34,197,94,0.82)" text-anchor="middle">4.5</text>
  <text class="pos lbl" x="220" y="141" fill="rgba(34,197,94,0.60)" text-anchor="middle">rₜ + γ·V<tspan dy="2.5" font-size="5.5">w</tspan><tspan dy="-2.5">(Sₜ₊₁)</tspan></text>

  <!-- δ_t bracket positive (y=38→68) -->
  <line class="pos" x1="262" y1="38" x2="278" y2="38" stroke="rgba(34,197,94,0.72)" stroke-width="1.2"/>
  <line class="pos" x1="262" y1="68" x2="278" y2="68" stroke="rgba(34,197,94,0.72)" stroke-width="1.2"/>
  <line class="pos" x1="270" y1="38" x2="270" y2="68" stroke="rgba(34,197,94,0.72)" stroke-width="1.2"/>
  <text class="pos lbl" x="283" y="47" fill="rgba(34,197,94,0.90)">δₜ =</text>
  <text class="pos lbl" x="283" y="58" fill="rgba(34,197,94,0.90)">+1.5</text>

  <!-- ── BAR 2 NEGATIVE: r+γV = 1.5 → h=30, top=y=98, δ=−1.5 ── -->
  <rect class="neg" x="190" y="98" width="60" height="30" rx="3"
        fill="rgba(239,68,68,0.18)" stroke="rgba(239,68,68,0.55)" stroke-width="1"/>
  <text class="neg lbl" x="220" y="92" fill="rgba(239,68,68,0.82)" text-anchor="middle">1.5</text>
  <text class="neg lbl" x="220" y="141" fill="rgba(239,68,68,0.60)" text-anchor="middle">rₜ + γ·V<tspan dy="2.5" font-size="5.5">w</tspan><tspan dy="-2.5">(Sₜ₊₁)</tspan></text>

  <!-- δ_t bracket negative (y=68→98) -->
  <line class="neg" x1="262" y1="68" x2="278" y2="68" stroke="rgba(239,68,68,0.72)" stroke-width="1.2"/>
  <line class="neg" x1="262" y1="98" x2="278" y2="98" stroke="rgba(239,68,68,0.72)" stroke-width="1.2"/>
  <line class="neg" x1="270" y1="68" x2="270" y2="98" stroke="rgba(239,68,68,0.72)" stroke-width="1.2"/>
  <text class="neg lbl" x="283" y="77" fill="rgba(239,68,68,0.90)">δₜ =</text>
  <text class="neg lbl" x="283" y="88" fill="rgba(239,68,68,0.90)">−1.5</text>

  <!-- ── RIGHT PANEL ── -->

  <!-- Positive: better than expected → reinforce A_t -->
  <text class="pos sig" x="390" y="82" fill="rgba(34,197,94,0.92)">↑</text>
  <text class="pos lbl" x="420" y="64" fill="rgba(34,197,94,0.85)">better than expected</text>
  <text class="pos lbl" x="420" y="76" fill="rgba(34,197,94,0.68)">→ reinforce Aₜ</text>

  <!-- Negative: worse than expected → penalize A_t -->
  <text class="neg sig" x="390" y="82" fill="rgba(239,68,68,0.92)">↓</text>
  <text class="neg lbl" x="420" y="64" fill="rgba(239,68,68,0.85)">worse than expected</text>
  <text class="neg lbl" x="420" y="76" fill="rgba(239,68,68,0.68)">→ penalize Aₜ</text>

  <!-- Always-visible: π_θ label + update rule -->
  <text class="lbl" x="452" y="104" fill="rgba(0,212,255,0.55)" text-anchor="middle">π<tspan dy="2.5" font-size="5.5">θ</tspan><tspan dy="-2.5">(Aₜ | Sₜ)</tspan></text>
  <text class="tag" x="452" y="120" fill="rgba(255,255,255,0.16)" text-anchor="middle">θ ← θ + α·δₜ·∇ log π</text>
</svg>
